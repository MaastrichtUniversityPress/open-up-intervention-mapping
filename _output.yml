bookdown::gitbook:
  css: style.css
  config:
    toc:
      before: |
        <li><a href="./">Intervention Mapping Workbook</a></li>
      after: |
        <li><a href="./im-workbook.pdf" target="blank">PDF</a></li>
        <li><a href="./im-workbook.epub" target="blank">EPUB</a></li>
    edit: https://gitlab.com/intervention-mapping/uva-im/edit/master/%s
    download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: default
  pandoc_args: [ "--csl", "apa.csl" ]
  keep_tex: yes
bookdown::epub_book: default
